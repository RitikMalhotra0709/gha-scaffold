name: .NET CI

on:
  push:
    branches: [ {{branch}} ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: {{dotnetVersion}}

      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build