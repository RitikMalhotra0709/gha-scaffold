name: Node.js CI/CD with Docker

on:
  push:
    branches: [ {{branch}} ]
  pull_request:
    branches: [ {{branch}} ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

  build-push:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/{{branch}}' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      {{#if_eq registry "ghcr"}}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/{{imageName}}:${{ github.sha }},ghcr.io/${{ github.repository }}/{{imageName}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      {{/if_eq}}

      {{#if_eq registry "dockerhub"}}
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/{{imageName}}:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/{{imageName}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      {{/if_eq}}

      {{#if_eq registry "gcp-ar"}}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push to GCP Artifact Registry
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/{{imageName}}/{{imageName}}:${{ github.sha }},us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/{{imageName}}/{{imageName}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      {{/if_eq}}
