name: Node CI

on:
  push:
    branches: [ {{branch}} ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: {{nodeVersion}}

      - run: npm install
      - run: npm test